<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>小游戏</title>
<style>
  body { margin:0; background:#222; overflow:hidden; }
  #msg {
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    color:white;
    font-size:26px;
    opacity:0;
    transition:1s;
  }
</style>
</head>

<body>
<canvas id="game"></canvas>
<div id="msg">你已经走到我这了，要不要聊两句？🙂</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 玩家
let player = { x:100, y:100, size:20 };

// 目标（女生位置）
let target = { x:canvas.width/2, y:canvas.height/2, size:25 };

// 按键
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// 更新逻辑
function update(){
  if(keys["ArrowUp"]) player.y -= 3;
  if(keys["ArrowDown"]) player.y += 3;
  if(keys["ArrowLeft"]) player.x -= 3;
  if(keys["ArrowRight"]) player.x += 3;

  // 碰撞检测
  let dx = player.x - target.x;
  let dy = player.y - target.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < 30){
    document.getElementById("msg").style.opacity = 1;
  }
}

// 绘制
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 玩家（蓝色）
  ctx.fillStyle = "skyblue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
  ctx.fill();

  // 目标（粉色）
  ctx.fillStyle = "pink";
  ctx.beginPath();
  ctx.arc(target.x, target.y, target.size, 0, Math.PI*2);
  ctx.fill();
}

// 游戏循环
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
